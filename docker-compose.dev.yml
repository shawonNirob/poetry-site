# Dev workflow: live reload as you write.
# Run with:  docker compose -f docker-compose.dev.yml up --build
#
# Add a new .md file to src/content/poems or src/content/prose on your machine —
# it's bind-mounted into the container, Vite picks it up, and the browser
# refreshes automatically. Nothing to rebuild by hand.

services:
  afterglow-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: afterglow-dev
    ports:
      - "5173:5173"
    volumes:
      - ./src:/app/src
      - ./index.html:/app/index.html
    environment:
      - CHOKIDAR_USEPOLLING=true
